openapi: 3.0.3
info:
  title: Content Tracker API
  description: |
    API REST para controle de leitura/visualização de mangás, animes e novels.

    ## Autenticação
    - **Email/Senha**: `POST /auth/register` para criar conta, `POST /auth/login` para obter token.
    - **Google OAuth**: `POST /auth/google` para autenticar via token Google.
    - Inclua o token no header `Authorization: Bearer {token}` em todas as requisições autenticadas.

    ## Upload de Imagens
    Endpoints de criação/atualização de conteúdo aceitam `multipart/form-data` para upload de capa.
    A imagem é salva em `storage/public` e a URL completa é retornada no campo `cover`.

    ## Roles
    - `user`: acesso padrão
    - `admin`: acesso a listagem e gestão de solicitações de conteúdo
  version: 3.0.0
  contact:
    name: Content Tracker

servers:
  - url: http://localhost:8000/api
    description: Servidor de desenvolvimento

tags:
  - name: Auth
    description: Autenticação (email/senha e Google OAuth)
  - name: Contents
    description: Catálogo geral de conteúdos (mangás, animes, novels)
  - name: Content Requests
    description: Solicitações de novos conteúdos ao catálogo
  - name: Sites
    description: Sites de leitura/visualização
  - name: User Contents
    description: Biblioteca pessoal do usuário

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Sanctum

  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Matheus Ferreira
        username:
          type: string
          example: matheus_ferreira
        email:
          type: string
          format: email
          example: matheus@example.com
        avatar:
          type: string
          nullable: true
          example: https://lh3.googleusercontent.com/a/photo.jpg
        role:
          type: string
          enum: [user, admin]
          example: user
        created_at:
          type: string
          format: date-time

    Content:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: One Piece
        alternative_names:
          type: array
          items:
            type: string
          example: ["ワンピース", "OP"]
        cover:
          type: string
          nullable: true
          example: http://localhost:8000/storage/covers/one-piece.jpg
        type:
          type: string
          enum: [manga, anime, novel]
          example: manga
        status:
          type: string
          enum: [ongoing, completed, hiatus, cancelled]
          example: ongoing
        total_units:
          type: integer
          nullable: true
          example: 1110
        last_unit_update:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ContentRequest:
      type: object
      properties:
        id:
          type: integer
          example: 1
        user:
          $ref: '#/components/schemas/User'
        name:
          type: string
          example: Berserk
        alternative_names:
          type: array
          items:
            type: string
          example: ["ベルセルク"]
        type:
          type: string
          enum: [manga, anime, novel]
          example: manga
        cover:
          type: string
          nullable: true
          example: https://example.com/berserk-cover.jpg
        status:
          type: string
          enum: [pending, approved, rejected]
          example: pending
        admin:
          $ref: '#/components/schemas/User'
          nullable: true
        rejection_reason:
          type: string
          nullable: true
          example: Conteúdo já existe no catálogo
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Site:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: MangaDex
        url:
          type: string
          format: uri
          example: https://mangadex.org
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    UserContent:
      type: object
      properties:
        id:
          type: integer
          example: 1
        user_id:
          type: integer
          example: 1
        content:
          $ref: '#/components/schemas/Content'
        site:
          $ref: '#/components/schemas/Site'
          nullable: true
        current_units:
          type: integer
          example: 150
        last_unit_update:
          type: string
          format: date-time
          nullable: true
        rating:
          type: number
          format: float
          nullable: true
          example: 9.5
        status:
          type: string
          enum: [reading, completed, paused, dropped, plan_to_read]
          example: reading
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    PaginationMeta:
      type: object
      properties:
        current_page:
          type: integer
          example: 1
        last_page:
          type: integer
          example: 5
        per_page:
          type: integer
          example: 9999
        total:
          type: integer
          example: 72

    AuthResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
        data:
          type: object
          properties:
            user:
              $ref: '#/components/schemas/User'
            access_token:
              type: string
              example: 1|AbCdEfGhIjKlMnOpQrStUvWxYz
            token_type:
              type: string
              example: Bearer

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
        data:
          type: object

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: Erro de validação
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string

paths:
  /auth/register:
    post:
      tags: [Auth]
      summary: Registro com email e senha
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, username, email, password, password_confirmation]
              properties:
                name:
                  type: string
                  example: Matheus Ferreira
                username:
                  type: string
                  example: matheus_ferreira
                  description: Apenas letras, números e underscores
                email:
                  type: string
                  format: email
                  example: matheus@example.com
                password:
                  type: string
                  format: password
                  minLength: 8
                  example: senha12345
                password_confirmation:
                  type: string
                  format: password
                  example: senha12345
      responses:
        '201':
          description: Conta criada com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '422':
          description: Erro de validação (email/username já em uso)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/login:
    post:
      tags: [Auth]
      summary: Login com email e senha
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  example: matheus@example.com
                password:
                  type: string
                  format: password
                  example: senha12345
      responses:
        '200':
          description: Login realizado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Credenciais inválidas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/google:
    post:
      tags: [Auth]
      summary: Login com Google
      description: Autentica o usuário via token do Google OAuth e retorna um Bearer token Sanctum.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
                  description: ID Token retornado pelo Google Sign-In
                  example: eyJhbGciOiJSUzI1NiIsImtp...
      responses:
        '200':
          description: Login realizado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Token inválido

  /auth/forgot-password:
    post:
      tags: [Auth]
      summary: Solicitar e-mail de recuperação de senha
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
                  example: matheus@example.com
      responses:
        '200':
          description: E-mail enviado (mesmo que o e-mail não exista, por segurança)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /auth/reset-password:
    post:
      tags: [Auth]
      summary: Redefinir senha com token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, email, password, password_confirmation]
              properties:
                token:
                  type: string
                  description: Token recebido por e-mail
                  example: abc123token
                email:
                  type: string
                  format: email
                  example: matheus@example.com
                password:
                  type: string
                  format: password
                  minLength: 8
                  example: novaSenha123
                password_confirmation:
                  type: string
                  format: password
                  example: novaSenha123
      responses:
        '200':
          description: Senha redefinida com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: Token inválido ou expirado

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Logout realizado com sucesso

  /auth/me:
    get:
      tags: [Auth]
      summary: Dados do usuário autenticado
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Dados do usuário
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/User'

  /contents:
    get:
      tags: [Contents]
      summary: Listar catálogo
      description: Retorna o catálogo geral com filtros por tipo, status, busca por nome/nomes alternativos e recém adicionados.
      security:
        - bearerAuth: []
      parameters:
        - name: type
          in: query
          description: Filtrar por tipo
          schema:
            type: string
            enum: [manga, anime, novel]
        - name: status
          in: query
          description: Filtrar por status do conteúdo
          schema:
            type: string
            enum: [ongoing, completed, hiatus, cancelled]
        - name: search
          in: query
          description: Buscar por nome ou nomes alternativos
          schema:
            type: string
          example: One Piece
        - name: recent
          in: query
          description: Se true, retorna apenas conteúdos adicionados nos últimos 5 dias
          schema:
            type: boolean
          example: true
      responses:
        '200':
          description: Lista de conteúdos
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Content'

    post:
      tags: [Contents]
      summary: Criar conteúdo no catálogo
      description: Cria novo conteúdo. Verifica duplicidade por nome e nomes alternativos.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [name, type]
              properties:
                name:
                  type: string
                  example: One Piece
                alternative_names:
                  type: array
                  items:
                    type: string
                  example: ["ワンピース"]
                cover:
                  type: string
                  format: binary
                  description: Imagem da capa (jpeg, png, jpg, gif, webp — max 2MB)
                type:
                  type: string
                  enum: [manga, anime, novel]
                  example: manga
                status:
                  type: string
                  enum: [ongoing, completed, hiatus, cancelled]
                  default: ongoing
                total_units:
                  type: integer
                  nullable: true
                  example: 1110
      responses:
        '201':
          description: Conteúdo criado
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Content'
        '422':
          description: Duplicidade detectada ou erro de validação

  /contents/{id}:
    get:
      tags: [Contents]
      summary: Buscar conteúdo por ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Conteúdo encontrado
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Content'
        '404':
          description: Conteúdo não encontrado

    patch:
      tags: [Contents]
      summary: Atualizar conteúdo
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                name:
                  type: string
                alternative_names:
                  type: array
                  items:
                    type: string
                cover:
                  type: string
                  format: binary
                type:
                  type: string
                  enum: [manga, anime, novel]
                status:
                  type: string
                  enum: [ongoing, completed, hiatus, cancelled]
                total_units:
                  type: integer
                  nullable: true
      responses:
        '200':
          description: Conteúdo atualizado
        '404':
          description: Conteúdo não encontrado

    delete:
      tags: [Contents]
      summary: Remover conteúdo
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Conteúdo removido
        '404':
          description: Conteúdo não encontrado

  /content-requests:
    get:
      tags: [Content Requests]
      summary: Listar todas as solicitações (admin)
      description: Requer role=admin.
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, approved, rejected]
      responses:
        '200':
          description: Lista de solicitações
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/ContentRequest'
        '403':
          description: Acesso negado (não é admin)

    post:
      tags: [Content Requests]
      summary: Criar solicitação de novo conteúdo
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, type]
              properties:
                name:
                  type: string
                  example: Berserk
                alternative_names:
                  type: array
                  items:
                    type: string
                  example: ["ベルセルク"]
                type:
                  type: string
                  enum: [manga, anime, novel]
                  example: manga
                cover:
                  type: string
                  nullable: true
                  example: https://example.com/berserk.jpg
      responses:
        '201':
          description: Solicitação enviada
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ContentRequest'

  /content-requests/my:
    get:
      tags: [Content Requests]
      summary: Minhas solicitações
      description: Retorna as solicitações do usuário autenticado.
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, approved, rejected]
      responses:
        '200':
          description: Minhas solicitações
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/ContentRequest'

  /content-requests/{id}/approve:
    patch:
      tags: [Content Requests]
      summary: Aprovar solicitação (admin)
      description: Aprova a solicitação e cria automaticamente o conteúdo no catálogo. Requer role=admin.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Solicitação aprovada, conteúdo criado no catálogo
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ContentRequest'
        '403':
          description: Acesso negado
        '422':
          description: Solicitação já foi processada

  /content-requests/{id}/reject:
    patch:
      tags: [Content Requests]
      summary: Rejeitar solicitação (admin)
      description: Rejeita a solicitação com motivo obrigatório. Requer role=admin.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [rejection_reason]
              properties:
                rejection_reason:
                  type: string
                  example: Conteúdo já existe no catálogo com nome diferente
      responses:
        '200':
          description: Solicitação rejeitada
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ContentRequest'
        '403':
          description: Acesso negado
        '422':
          description: Solicitação já foi processada

  /sites:
    get:
      tags: [Sites]
      summary: Listar sites
      security:
        - bearerAuth: []
      parameters:
        - name: search
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Lista de sites
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Site'

    post:
      tags: [Sites]
      summary: Criar site
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, url]
              properties:
                name:
                  type: string
                  example: MangaDex
                url:
                  type: string
                  format: uri
                  example: https://mangadex.org
      responses:
        '201':
          description: Site criado

  /sites/{id}:
    get:
      tags: [Sites]
      summary: Buscar site por ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Site encontrado

    patch:
      tags: [Sites]
      summary: Atualizar site
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                url:
                  type: string
                  format: uri
      responses:
        '200':
          description: Site atualizado

    delete:
      tags: [Sites]
      summary: Remover site
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Site removido

  /user-contents:
    get:
      tags: [User Contents]
      summary: Listar biblioteca do usuário
      security:
        - bearerAuth: []
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [manga, anime, novel]
        - name: status
          in: query
          schema:
            type: string
            enum: [reading, completed, paused, dropped, plan_to_read]
      responses:
        '200':
          description: Biblioteca do usuário
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/UserContent'

    post:
      tags: [User Contents]
      summary: Adicionar conteúdo à biblioteca
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content_id]
              properties:
                content_id:
                  type: integer
                  example: 1
                site_id:
                  type: integer
                  nullable: true
                current_units:
                  type: integer
                  default: 0
                rating:
                  type: number
                  format: float
                  nullable: true
                  minimum: 0
                  maximum: 10
                status:
                  type: string
                  enum: [reading, completed, paused, dropped, plan_to_read]
                  default: plan_to_read
      responses:
        '201':
          description: Conteúdo adicionado à biblioteca
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/UserContent'

  /user-contents/{id}:
    get:
      tags: [User Contents]
      summary: Buscar item da biblioteca por ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Item encontrado
        '403':
          description: Acesso negado
        '404':
          description: Item não encontrado

    patch:
      tags: [User Contents]
      summary: Atualizar item da biblioteca
      description: Atualiza status, rating, site ou progresso. Atualiza last_unit_update quando current_units é enviado.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                site_id:
                  type: integer
                  nullable: true
                current_units:
                  type: integer
                  minimum: 0
                rating:
                  type: number
                  format: float
                  nullable: true
                  minimum: 0
                  maximum: 10
                status:
                  type: string
                  enum: [reading, completed, paused, dropped, plan_to_read]
      responses:
        '200':
          description: Item atualizado

    delete:
      tags: [User Contents]
      summary: Remover item da biblioteca
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Item removido
        '403':
          description: Acesso negado
        '404':
          description: Item não encontrado

  /user-contents/{id}/increment:
    patch:
      tags: [User Contents]
      summary: Incrementar progresso (+1 unidade)
      description: Incrementa current_units em 1 e atualiza last_unit_update.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Progresso incrementado
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/UserContent'
        '403':
          description: Acesso negado
        '404':
          description: Item não encontrado
