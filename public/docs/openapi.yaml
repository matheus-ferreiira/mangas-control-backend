openapi: 3.0.3
info:
  title: Content Tracker API
  description: |
    API REST para controle de leitura/visualização de mangás, animes e novels.

    ## Autenticação
    Utilize o endpoint `POST /auth/google` para obter um Bearer token via Google OAuth.
    Inclua o token no header `Authorization: Bearer {token}` em todas as requisições autenticadas.

    ## Upload de Imagens
    Endpoints de criação/atualização de conteúdo aceitam `multipart/form-data` para upload de capa.
    A URL da imagem é retornada no campo `cover` do resource.
  version: 2.0.0
  contact:
    name: Content Tracker

servers:
  - url: http://localhost:8000/api
    description: Servidor de desenvolvimento

tags:
  - name: Auth
    description: Autenticação via Google OAuth
  - name: Contents
    description: Acervo geral de conteúdos (mangás, animes, novels)
  - name: Sites
    description: Sites de leitura/visualização
  - name: User Contents
    description: Biblioteca pessoal do usuário

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Sanctum

  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Matheus Ferreira
        email:
          type: string
          format: email
          example: matheus@example.com
        avatar:
          type: string
          nullable: true
          example: https://lh3.googleusercontent.com/a/photo.jpg
        role:
          type: string
          enum: [user, admin]
          example: user
        created_at:
          type: string
          format: date-time

    Content:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: One Piece
        cover:
          type: string
          nullable: true
          example: http://localhost:8000/storage/covers/one-piece.jpg
        type:
          type: string
          enum: [manga, anime, novel]
          example: manga
        total_units:
          type: integer
          nullable: true
          example: 1110
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Site:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: MangaDex
        url:
          type: string
          format: uri
          example: https://mangadex.org
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    UserContent:
      type: object
      properties:
        id:
          type: integer
          example: 1
        user_id:
          type: integer
          example: 1
        content:
          $ref: '#/components/schemas/Content'
        site:
          $ref: '#/components/schemas/Site'
          nullable: true
        current_units:
          type: integer
          example: 150
        rating:
          type: number
          format: float
          nullable: true
          example: 9.5
        status:
          type: string
          enum: [reading, completed, paused, dropped, plan_to_read]
          example: reading
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    PaginationMeta:
      type: object
      properties:
        current_page:
          type: integer
          example: 1
        last_page:
          type: integer
          example: 5
        per_page:
          type: integer
          example: 15
        total:
          type: integer
          example: 72
        from:
          type: integer
          example: 1
        to:
          type: integer
          example: 15

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
        data:
          type: object

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: Erro de validação
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string

paths:
  /auth/google:
    post:
      tags: [Auth]
      summary: Login com Google
      description: Autentica o usuário via token do Google OAuth e retorna um Bearer token Sanctum.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
                  description: ID Token retornado pelo Google Sign-In
                  example: eyJhbGciOiJSUzI1NiIsImtp...
      responses:
        '200':
          description: Login realizado com sucesso
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          user:
                            $ref: '#/components/schemas/User'
                          token:
                            type: string
                            example: 1|AbCdEfGhIjKlMnOpQrStUvWxYz
        '401':
          description: Token inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Logout realizado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /auth/me:
    get:
      tags: [Auth]
      summary: Dados do usuário autenticado
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Dados do usuário
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/User'

  /contents:
    get:
      tags: [Contents]
      summary: Listar conteúdos
      description: Retorna o acervo geral paginado. Pode ser filtrado por tipo e pesquisado por nome.
      security:
        - bearerAuth: []
      parameters:
        - name: type
          in: query
          description: Filtrar por tipo de conteúdo
          schema:
            type: string
            enum: [manga, anime, novel]
          example: manga
        - name: search
          in: query
          description: Buscar por nome
          schema:
            type: string
          example: One Piece
        - name: page
          in: query
          schema:
            type: integer
            default: 1
      responses:
        '200':
          description: Lista de conteúdos paginada
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          data:
                            type: array
                            items:
                              $ref: '#/components/schemas/Content'
                          meta:
                            $ref: '#/components/schemas/PaginationMeta'

    post:
      tags: [Contents]
      summary: Criar conteúdo
      description: Cria um novo conteúdo no acervo. Suporta upload de capa via multipart/form-data.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [name, type]
              properties:
                name:
                  type: string
                  example: One Piece
                cover:
                  type: string
                  format: binary
                  description: Imagem da capa (jpeg, png, jpg, gif, webp — max 2MB)
                type:
                  type: string
                  enum: [manga, anime, novel]
                  example: manga
                total_units:
                  type: integer
                  nullable: true
                  example: 1110
      responses:
        '201':
          description: Conteúdo criado
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Content'
        '422':
          description: Erro de validação
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /contents/{id}:
    get:
      tags: [Contents]
      summary: Buscar conteúdo por ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Conteúdo encontrado
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Content'
        '404':
          description: Conteúdo não encontrado

    put:
      tags: [Contents]
      summary: Atualizar conteúdo
      description: Atualiza um conteúdo existente. Envia multipart/form-data para substituir a capa.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                name:
                  type: string
                cover:
                  type: string
                  format: binary
                type:
                  type: string
                  enum: [manga, anime, novel]
                total_units:
                  type: integer
                  nullable: true
      responses:
        '200':
          description: Conteúdo atualizado
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Content'
        '404':
          description: Conteúdo não encontrado

    delete:
      tags: [Contents]
      summary: Remover conteúdo
      description: Remove o conteúdo e sua capa do storage.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Conteúdo removido
        '404':
          description: Conteúdo não encontrado

  /sites:
    get:
      tags: [Sites]
      summary: Listar sites
      security:
        - bearerAuth: []
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
      responses:
        '200':
          description: Lista de sites paginada
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Site'

    post:
      tags: [Sites]
      summary: Criar site
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, url]
              properties:
                name:
                  type: string
                  example: MangaDex
                url:
                  type: string
                  format: uri
                  example: https://mangadex.org
      responses:
        '201':
          description: Site criado
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Site'

  /sites/{id}:
    get:
      tags: [Sites]
      summary: Buscar site por ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Site encontrado

    put:
      tags: [Sites]
      summary: Atualizar site
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                url:
                  type: string
                  format: uri
      responses:
        '200':
          description: Site atualizado

    delete:
      tags: [Sites]
      summary: Remover site
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Site removido

  /user-contents:
    get:
      tags: [User Contents]
      summary: Listar biblioteca do usuário
      description: Retorna os conteúdos adicionados pelo usuário autenticado, com filtros por tipo e status.
      security:
        - bearerAuth: []
      parameters:
        - name: type
          in: query
          description: Filtrar por tipo
          schema:
            type: string
            enum: [manga, anime, novel]
        - name: status
          in: query
          description: Filtrar por status
          schema:
            type: string
            enum: [reading, completed, paused, dropped, plan_to_read]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
      responses:
        '200':
          description: Biblioteca do usuário paginada
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          data:
                            type: array
                            items:
                              $ref: '#/components/schemas/UserContent'
                          meta:
                            $ref: '#/components/schemas/PaginationMeta'

    post:
      tags: [User Contents]
      summary: Adicionar conteúdo à biblioteca
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content_id]
              properties:
                content_id:
                  type: integer
                  example: 1
                site_id:
                  type: integer
                  nullable: true
                  example: 1
                current_units:
                  type: integer
                  default: 0
                  example: 150
                rating:
                  type: number
                  format: float
                  nullable: true
                  minimum: 0
                  maximum: 10
                  example: 9.5
                status:
                  type: string
                  enum: [reading, completed, paused, dropped, plan_to_read]
                  default: plan_to_read
                  example: reading
      responses:
        '201':
          description: Conteúdo adicionado à biblioteca
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/UserContent'

  /user-contents/{id}:
    get:
      tags: [User Contents]
      summary: Buscar item da biblioteca por ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Item encontrado
        '403':
          description: Acesso negado
        '404':
          description: Item não encontrado

    patch:
      tags: [User Contents]
      summary: Atualizar item da biblioteca
      description: Atualiza status, rating, site ou progresso atual.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                site_id:
                  type: integer
                  nullable: true
                current_units:
                  type: integer
                  minimum: 0
                rating:
                  type: number
                  format: float
                  nullable: true
                  minimum: 0
                  maximum: 10
                status:
                  type: string
                  enum: [reading, completed, paused, dropped, plan_to_read]
      responses:
        '200':
          description: Item atualizado
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/UserContent'

    delete:
      tags: [User Contents]
      summary: Remover item da biblioteca
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Item removido da biblioteca
        '403':
          description: Acesso negado
        '404':
          description: Item não encontrado

  /user-contents/{id}/increment:
    patch:
      tags: [User Contents]
      summary: Incrementar progresso (+1 unidade)
      description: Incrementa current_units em 1. Útil para o botão de +1 capítulo/episódio.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Progresso incrementado
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/UserContent'
        '403':
          description: Acesso negado
        '404':
          description: Item não encontrado
